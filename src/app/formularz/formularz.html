<form class="licznik" #formularz="ngForm" (ngSubmit)="onSubmit(formularz)">
    <div>
        <label form="name">Imię: </label>
        <input  required minlength="3" type="text" id="name" name="name" [(ngModel)]="name" (ngModelChange)="onnameChange($event)">
    </div>
    <div>
        <label form="surname">Nazwisko: </label>
        <input required minlength="5" type="text" id="surname" name="surname" [(ngModel)]="surname">
    </div>
    <div>
        <label form="dateOfBirth">Data urodzenia: </label>
        <input  required type="date" id="dateOfBirth" name="dateOfBirth" [(ngModel)]="dateOfBirth">
    </div>
    <div>
        <button type="button">Przycisk</button>
        <input type="button" value="Input jako Przycisk">
        <input [disabled]="!formularz.valid" type="submit" name="submit" value="Zapisz">
    </div>
</form>
<div class="licznik">
    Dodawana osoba:
    <ul>
        <li>Imię: {{name}}</li>
        <li>Nazwisko: {{surname}}</li>
        <li>Data urodzenia: {{dateOfBirth}}</li>
    </ul>
</div>
<div>
    <button (click)="zeruj()">Zeruj</button>
</div>
